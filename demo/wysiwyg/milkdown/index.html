<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milkdown Djot WYSIWYG Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: #f472b6;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .subtitle a {
            color: #38bdf8;
        }
        .editor-wrapper {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toolbar {
            background: #334155;
            padding: 8px 12px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            border-bottom: 1px solid #475569;
        }
        .toolbar .group {
            display: flex;
            gap: 2px;
            background: #1e293b;
            border-radius: 6px;
            padding: 2px;
        }
        .toolbar button {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        .toolbar button:hover {
            background: #475569;
            color: #fff;
        }
        .toolbar button.active {
            background: #f472b6;
            color: #0f172a;
        }
        .toolbar .divider {
            width: 1px;
            background: #475569;
            margin: 0 6px;
        }
        #editor {
            min-height: 400px;
            padding: 20px;
        }
        /* Milkdown editor styles */
        .milkdown {
            color: #e2e8f0;
            line-height: 1.7;
        }
        .milkdown .editor {
            outline: none;
        }
        .milkdown h1, .milkdown h2, .milkdown h3, .milkdown h4 {
            color: #f472b6;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .milkdown h1 { font-size: 2em; }
        .milkdown h2 { font-size: 1.5em; }
        .milkdown h3 { font-size: 1.25em; }
        .milkdown p {
            margin: 1em 0;
        }
        .milkdown strong {
            color: #fb923c;
            font-weight: 700;
        }
        .milkdown em {
            color: #fbbf24;
            font-style: italic;
        }
        .milkdown code {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            color: #4ade80;
            font-size: 0.9em;
        }
        .milkdown pre {
            background: #334155;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .milkdown pre code {
            background: none;
            padding: 0;
        }
        .milkdown blockquote {
            border-left: 4px solid #f472b6;
            margin: 1em 0;
            padding-left: 16px;
            color: #94a3b8;
        }
        .milkdown ul, .milkdown ol {
            padding-left: 24px;
            margin: 1em 0;
        }
        .milkdown li {
            margin: 0.5em 0;
        }
        .milkdown a {
            color: #38bdf8;
            text-decoration: none;
        }
        .milkdown a:hover {
            text-decoration: underline;
        }
        .milkdown hr {
            border: none;
            border-top: 2px solid #334155;
            margin: 2em 0;
        }
        .milkdown table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }
        .milkdown th, .milkdown td {
            border: 1px solid #334155;
            padding: 8px 12px;
            text-align: left;
        }
        .milkdown th {
            background: #334155;
        }
        .milkdown s {
            color: #64748b;
        }
        .milkdown .ProseMirror-selectednode {
            outline: 2px solid #f472b6;
        }
        /* Output panel */
        .output-panel {
            margin-top: 20px;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }
        .output-header {
            background: #334155;
            padding: 0 15px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .output-header button {
            background: #475569;
            border: none;
            color: #e2e8f0;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .output-content {
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            color: #94a3b8;
            max-height: 300px;
            overflow: auto;
        }
        .tabs {
            display: flex;
            gap: 0;
        }
        .tabs button {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tabs button:hover {
            color: #94a3b8;
        }
        .tabs button.active {
            color: #f472b6;
            border-bottom-color: #f472b6;
        }
        .info {
            background: #1e3a5f;
            border-left: 4px solid #38bdf8;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
        }
        .info code {
            background: #334155;
            padding: 2px 6px;
            border-radius: 3px;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Milkdown WYSIWYG Editor</h1>
        <p class="subtitle">
            True WYSIWYG editing with <a href="https://milkdown.dev">Milkdown</a> |
            Djot output via <a href="https://github.com/jgm/djot.js">djot.js</a>
        </p>

        <div class="info">
            <strong>Milkdown</strong> is a plugin-driven WYSIWYG editor built on ProseMirror.
            Toolbar buttons are fully functional - try them! Output converts to Djot syntax.
        </div>

        <div class="editor-wrapper">
            <div class="toolbar" id="toolbar">
                <div class="group">
                    <button data-cmd="toggleStrong" title="Strong (Ctrl+B)"><b>B</b></button>
                    <button data-cmd="toggleEmphasis" title="Emphasis (Ctrl+I)"><i>I</i></button>
                    <button data-cmd="toggleStrikethrough" title="Strikethrough"><s>S</s></button>
                    <button data-cmd="toggleInlineCode" title="Code (Ctrl+`)"><code>&lt;/&gt;</code></button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="wrapInHeading1" title="Heading 1">H1</button>
                    <button data-cmd="wrapInHeading2" title="Heading 2">H2</button>
                    <button data-cmd="wrapInHeading3" title="Heading 3">H3</button>
                    <button data-cmd="turnIntoText" title="Paragraph">¶</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="wrapInBulletList" title="Bullet list">•</button>
                    <button data-cmd="wrapInOrderedList" title="Numbered list">1.</button>
                    <button data-cmd="wrapInBlockquote" title="Blockquote">"</button>
                    <button data-cmd="createCodeBlock" title="Code block">{ }</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="insertLink" title="Insert link">🔗</button>
                    <button data-cmd="insertHr" title="Horizontal rule">―</button>
                    <button data-cmd="insertTable" title="Insert table">▦</button>
                </div>
                <div class="divider"></div>
                <div class="group">
                    <button data-cmd="undo" title="Undo (Ctrl+Z)">↩</button>
                    <button data-cmd="redo" title="Redo (Ctrl+Y)">↪</button>
                </div>
            </div>
            <div id="editor"></div>
        </div>

        <div class="output-panel">
            <div class="output-header">
                <div class="tabs">
                    <button class="active" data-tab="djot">Djot Output</button>
                    <button data-tab="markdown">Markdown Output</button>
                    <button data-tab="html">HTML Output</button>
                </div>
                <button id="copy-output">Copy</button>
            </div>
            <div class="output-content" id="output"></div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "@milkdown/kit": "https://esm.sh/@milkdown/kit@7",
            "@milkdown/core": "https://esm.sh/@milkdown/core@7",
            "@milkdown/ctx": "https://esm.sh/@milkdown/ctx@7",
            "@milkdown/prose": "https://esm.sh/@milkdown/prose@7",
            "@milkdown/preset-commonmark": "https://esm.sh/@milkdown/preset-commonmark@7",
            "@milkdown/preset-gfm": "https://esm.sh/@milkdown/preset-gfm@7",
            "@milkdown/plugin-listener": "https://esm.sh/@milkdown/plugin-listener@7",
            "@milkdown/plugin-history": "https://esm.sh/@milkdown/plugin-history@7",
            "@milkdown/utils": "https://esm.sh/@milkdown/utils@7",
            "@djot/djot": "https://esm.sh/@djot/djot@0"
        }
    }
    </script>

    <script type="module">
        import { Editor, rootCtx, defaultValueCtx, editorViewCtx, commandsCtx } from '@milkdown/core';
        import { commonmark, toggleStrongCommand, toggleEmphasisCommand, toggleInlineCodeCommand, wrapInHeadingCommand, wrapInBulletListCommand, wrapInOrderedListCommand, wrapInBlockquoteCommand, createCodeBlockCommand, turnIntoTextCommand, insertHrCommand } from '@milkdown/preset-commonmark';
        import { gfm, toggleStrikethroughCommand, insertTableCommand } from '@milkdown/preset-gfm';
        import { listener, listenerCtx } from '@milkdown/plugin-listener';
        import { history, undoCommand, redoCommand } from '@milkdown/plugin-history';
        import { callCommand } from '@milkdown/utils';
        import * as djot from '@djot/djot';

        let currentTab = 'djot';
        let editorInstance = null;
        let currentMarkdown = '';

        const initialContent = `# Welcome to Milkdown

This is a **fully functional** WYSIWYG editor with _working toolbar buttons_.

## Features

Click the toolbar buttons to format text:

- **Strong text** → Djot \`*text*\`
- *Emphasized text* → Djot \`_text_\`
- ~~Strikethrough~~ → Djot \`{-text-}\`
- \`Inline code\` → Djot \`\\\`text\\\`\`

## Block Elements

### Code Blocks

\`\`\`javascript
const editor = new Milkdown();
editor.create();
\`\`\`

### Blockquotes

> Milkdown is built on ProseMirror and uses
> remark for Markdown parsing.

### Lists

1. First ordered item
2. Second ordered item
   - Nested bullet
   - Another nested item
3. Third ordered item

### Tables

| Feature | Milkdown | Tiptap |
|---------|----------|--------|
| Plugins | Yes | Yes |
| Markdown | Native | Via ext |
| GFM | Yes | Partial |

---

Try the toolbar buttons above to see the Djot output change!
`;

        // Convert Markdown to Djot
        function markdownToDjot(md) {
            let djotText = md
                // Protect bold: ** -> placeholder
                .replace(/\*\*([^*]+)\*\*/g, '\x00STRONG\x00$1\x00/STRONG\x00')
                // Convert italic: * -> _
                .replace(/\*([^*\x00]+)\*/g, '_$1_')
                // Restore bold: placeholder -> *
                .replace(/\x00STRONG\x00([^\x00]+)\x00\/STRONG\x00/g, '*$1*')
                // Convert strikethrough: ~~ -> {- -}
                .replace(/~~([^~]+)~~/g, '{-$1-}');

            return djotText;
        }

        // Create editor
        async function createEditor() {
            editorInstance = await Editor.make()
                .config((ctx) => {
                    ctx.set(rootCtx, document.getElementById('editor'));
                    ctx.set(defaultValueCtx, initialContent);
                    ctx.get(listenerCtx).markdownUpdated((ctx, markdown, prevMarkdown) => {
                        currentMarkdown = markdown;
                        updateOutput();
                    });
                })
                .use(commonmark)
                .use(gfm)
                .use(listener)
                .use(history)
                .create();

            currentMarkdown = initialContent;
            updateOutput();
            setupToolbar();
        }

        function setupToolbar() {
            document.querySelectorAll('.toolbar button[data-cmd]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cmd = btn.dataset.cmd;
                    executeCommand(cmd);
                });
            });
        }

        function executeCommand(cmdName) {
            if (!editorInstance) return;

            const view = editorInstance.ctx.get(editorViewCtx);
            view.focus();

            try {
                switch (cmdName) {
                    case 'toggleStrong':
                        editorInstance.action(callCommand(toggleStrongCommand.key));
                        break;
                    case 'toggleEmphasis':
                        editorInstance.action(callCommand(toggleEmphasisCommand.key));
                        break;
                    case 'toggleStrikethrough':
                        editorInstance.action(callCommand(toggleStrikethroughCommand.key));
                        break;
                    case 'toggleInlineCode':
                        editorInstance.action(callCommand(toggleInlineCodeCommand.key));
                        break;
                    case 'wrapInHeading1':
                        editorInstance.action(callCommand(wrapInHeadingCommand.key, 1));
                        break;
                    case 'wrapInHeading2':
                        editorInstance.action(callCommand(wrapInHeadingCommand.key, 2));
                        break;
                    case 'wrapInHeading3':
                        editorInstance.action(callCommand(wrapInHeadingCommand.key, 3));
                        break;
                    case 'turnIntoText':
                        editorInstance.action(callCommand(turnIntoTextCommand.key));
                        break;
                    case 'wrapInBulletList':
                        editorInstance.action(callCommand(wrapInBulletListCommand.key));
                        break;
                    case 'wrapInOrderedList':
                        editorInstance.action(callCommand(wrapInOrderedListCommand.key));
                        break;
                    case 'wrapInBlockquote':
                        editorInstance.action(callCommand(wrapInBlockquoteCommand.key));
                        break;
                    case 'createCodeBlock':
                        editorInstance.action(callCommand(createCodeBlockCommand.key));
                        break;
                    case 'insertHr':
                        editorInstance.action(callCommand(insertHrCommand.key));
                        break;
                    case 'insertTable':
                        editorInstance.action(callCommand(insertTableCommand.key));
                        break;
                    case 'insertLink':
                        const url = prompt('Enter URL:');
                        if (url) {
                            // For link, we need to wrap selected text
                            const { state } = view;
                            const { from, to } = state.selection;
                            const text = state.doc.textBetween(from, to);
                            const linkMd = `[${text || 'link'}](${url})`;
                            view.dispatch(state.tr.replaceSelectionWith(
                                state.schema.text(linkMd)
                            ));
                        }
                        break;
                    case 'undo':
                        editorInstance.action(callCommand(undoCommand.key));
                        break;
                    case 'redo':
                        editorInstance.action(callCommand(redoCommand.key));
                        break;
                }
            } catch (e) {
                console.error('Command failed:', cmdName, e);
            }
        }

        function updateOutput() {
            const outputEl = document.getElementById('output');

            if (currentTab === 'djot') {
                outputEl.textContent = markdownToDjot(currentMarkdown);
            } else if (currentTab === 'markdown') {
                outputEl.textContent = currentMarkdown;
            } else if (currentTab === 'html') {
                try {
                    const djotText = markdownToDjot(currentMarkdown);
                    const doc = djot.parse(djotText);
                    outputEl.textContent = djot.renderHTML(doc);
                } catch (e) {
                    outputEl.textContent = 'Error rendering HTML: ' + e.message;
                }
            }
        }

        // Tab switching
        document.querySelectorAll('.tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                updateOutput();
            });
        });

        // Copy button
        document.getElementById('copy-output').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('output').textContent);
        });

        // Initialize
        createEditor();
    </script>
</body>
</html>
